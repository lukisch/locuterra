name: LOCUTERRA demo CI

on:
  push:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"
  pull_request:
    paths:
      - "demo/**"
      - ".github/workflows/demo-ci.yml"
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: demo
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: demo/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint demo
        run: npm run lint

      - name: Build static demo
        run: npm run build
